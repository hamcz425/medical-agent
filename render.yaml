databases:
  - name: medical-agent-db
    plan: free
    databaseName: medical_agent
    user: medical_agent_user

services:
  - type: web
    name: medical-rag
    runtime: docker
    plan: free
    envVars:
      - key: ZHIPUAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: SEED_DEMO_DATA
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "https://medical-agent-1kp0.onrender.com"
    envVarsGroups:
      - databaseName: medical-agent-db
